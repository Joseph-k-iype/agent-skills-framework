name: data-lineage
version: 0.1.0
description: 'Tracks column-level data lineage across pipelines, ETL jobs, and data
  sources. Constructs lineage graphs from metadata, parses SQL transformations, and
  traces data flow from source to consumption.

  '
runtime: python
api_version: 1
entry: src/main.py
triggers:
  events:
  - pipeline.completed
  - schema.changed
  commands:
  - /trace
  - /lineage-graph
  - /impact-analysis
capabilities:
- lineage:trace
- lineage:graph
- lineage:impact
config:
  required:
  - pipeline_endpoint
  - lineage_store
dependencies:
  pip:
  - pydantic>=2.0
  - sqlparse>=0.4
  - networkx>=3.0
  skills:
  - data-discovery@^0.1.0
permissions:
- resource: lineage
  actions:
  - read
  - write
- resource: pipeline
  actions:
  - read
- resource: datasource
  actions:
  - read
id: skill://sha256/ce31c3e8265951124c9baa7d315a83856293917e0d3c306e3430999bb851e56c/data-lineage@0.1.0
