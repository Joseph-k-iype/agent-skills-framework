name: data-tagging
version: 0.1.0
description: 'Applies business and technical tags to data assets based on configurable
  rules. Supports automatic tag propagation through column-level lineage and tag inheritance
  from upstream assets.

  '
runtime: python
api_version: 1
entry: src/main.py
triggers:
  events:
  - asset.tagged
  - schema.updated
  commands:
  - /apply-tags
  - /propagate
  - /list-tags
capabilities:
- tagging:apply
- tagging:propagate
- tagging:list
config:
  required:
  - tag_rules
  - tag_endpoint
dependencies:
  pip:
  - pydantic>=2.0
  - pyyaml>=6.0
  skills:
  - data-lineage@^0.1.0
permissions:
- resource: tag
  actions:
  - read
  - write
  - delete
- resource: asset
  actions:
  - read
  - write
id: skill://sha256/7ec0dd12eb63e9eb44c3c44ffdb823fc0a8063638959561ad92e9f64572288d9/data-tagging@0.1.0
