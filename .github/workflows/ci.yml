name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test deps
        run: pip install -e sdks/python[test]

      - name: Install TypeScript deps
        run: cd sdks/typescript && npm install

      - name: Run test suite
        run: make test

      - name: Verify published skills against git history
        run: make verify-published
        continue-on-error: true
