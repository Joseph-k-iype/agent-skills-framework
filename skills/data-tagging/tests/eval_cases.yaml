version: 1
cases:
  - id: apply-tags-with-no-rules-tags-nothing
    description: "/apply-tags with no tag rules configured still returns success with zero tags applied"
    input: {type: command, name: /apply-tags, payload: {assets: [{id: a1, name: customers, type: table}]}}
    expect: {mode: exact_match, value: {status: success, assets_tagged: 1, total_tags: 0}}

  - id: apply-tags-counts-match-input-asset-count
    description: "assets_tagged always equals the number of assets passed in, regardless of how many tags matched"
    input: {type: command, name: /apply-tags, payload: {assets: [{id: a1}, {id: a2}, {id: a3}]}}
    expect: {mode: exact_match, value: {status: success, assets_tagged: 3}}

  - id: list-tags-reports-configured-rule-count
    description: "/list-tags reports the currently configured tagging rules"
    input: {type: command, name: /list-tags, args: []}
    expect: {mode: exact_match, value: {status: success, rules: []}}

  - id: propagate-reports-asset-id-and-count
    description: "/propagate echoes the asset_id and reports how many tags were propagated"
    input: {type: command, name: /propagate, payload: {asset_id: a1, tags: [{rule: pii, tag: email}]}}
    expect: {mode: exact_match, value: {status: success, asset_id: a1, propagated: 1}}

  - id: schema-updated-event-re-resolves-and-propagates-tags
    description: "schema.updated re-resolves tags for the asset whose schema changed and propagates them"
    input: {type: event, name: schema.updated, payload: {asset: {id: a1, name: customers}}}
    expect: {mode: exact_match, value: {status: success, tags_applied: 0, propagated: 0}}

  - id: unknown-command-is-an-error
    description: "An unrecognized command surfaces status=error rather than crashing"
    input: {type: command, name: /nope, args: []}
    expect: {mode: exact_match, value: {status: error}}

  - id: asset-tagged-event-reports-propagation-count
    description: "asset.tagged resolves and propagates tags for the announced asset"
    input: {type: event, name: asset.tagged, payload: {asset: {id: a1, name: customers}}}
    expect: {mode: contains, value: {message: customers}}

  - id: apply-tags-summary-explains-why-each-tag-was-applied
    description: "A data steward reviewing applied tags should understand which rule produced each tag"
    input:
      type: command
      name: /apply-tags
      payload: {assets: [{id: a1, name: customer_email, type: column}]}
    expect:
      mode: llm_judged
      rubric: >
        Score 100 if the result identifies which rule(s) produced each
        applied tag, so a steward can audit why a tag was assigned. Score
        lower if it only reports a bare count with no rule attribution.
