version: 1
cases:
  - id: discover-sensitive-flags-known-pii-patterns
    description: "/discover-sensitive flags columns whose names match common PII patterns"
    input:
      type: command
      name: /discover-sensitive
      payload:
        schema:
          columns:
            - {name: id}
            - {name: email_address}
            - {name: customer_ssn}
    expect: {mode: exact_match, value: {status: success, sensitive_fields: [email_address, customer_ssn]}}

  - id: discover-sensitive-ignores-non-pii-columns
    description: "Columns with no PII-pattern match are not flagged"
    input:
      type: command
      name: /discover-sensitive
      payload: {schema: {columns: [{name: id}, {name: created_at}]}}
    expect: {mode: exact_match, value: {status: success, sensitive_fields: []}}

  - id: mask-redacts-configured-fields
    description: "/mask applies the default redact technique to the fields named in the policy"
    input:
      type: command
      name: /mask
      payload: {dataset: {id: 1, email: "a@b.com"}, policy: ""}
    expect: {mode: exact_match, value: {status: success}}

  - id: asset-classified-pii-event-requires-masking
    description: "An asset classified as PII is flagged as requiring masking"
    input: {type: event, name: asset.classified, payload: {asset: {name: customers}, classification: pii}}
    expect: {mode: exact_match, value: {status: success, asset: customers, masking_required: true}}

  - id: asset-classified-non-pii-event-does-not-require-masking
    description: "An asset classified as something other than PII/PHI is not flagged"
    input: {type: event, name: asset.classified, payload: {asset: {name: products}, classification: reference}}
    expect: {mode: exact_match, value: {status: success, asset: products, masking_required: false}}

  - id: unknown-command-is-an-error
    description: "An unrecognized command surfaces status=error rather than crashing"
    input: {type: command, name: /nope, args: []}
    expect: {mode: exact_match, value: {status: error}}

  - id: policy-updated-event-is-recorded
    description: "policy.updated appends the new policy and reports the updated count"
    input: {type: event, name: policy.updated, payload: {policy: {name: gdpr-default}}}
    expect: {mode: exact_match, value: {status: success, policies: 1}}

  - id: discover-sensitive-result-is-trustworthy-for-a-compliance-review
    description: "A compliance reviewer should be able to trust the sensitive-field list without false negatives on common PII"
    input:
      type: command
      name: /discover-sensitive
      payload: {schema: {columns: [{name: home_address}, {name: phone_number}]}}
    expect:
      mode: llm_judged
      rubric: >
        Score 100 if every column name containing an obvious PII term (address,
        phone, email, ssn, credit_card, password) appears in sensitive_fields.
        Score 0 if any obvious PII column is missing from the result.
