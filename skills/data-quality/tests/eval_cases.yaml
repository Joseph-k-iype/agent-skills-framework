version: 1
cases:
  - id: validate-with-no-rules-still-returns-success
    description: "/validate with no quality rules configured returns success with an empty checks list per source"
    input: {type: command, name: /validate, payload: {sources: [{name: orders}]}}
    expect: {mode: exact_match, value: {status: success}}

  - id: validate-reports-one-result-per-source
    description: "The number of validation results matches the number of sources passed in"
    input: {type: command, name: /validate, payload: {sources: [{name: orders}, {name: customers}]}}
    expect: {mode: contains, value: {message: "Validated 2 sources"}}

  - id: rules-command-reports-configured-rule-count
    description: "/rules reports how many quality rules are currently configured"
    input: {type: command, name: /rules, args: []}
    expect: {mode: exact_match, value: {status: success, rules: []}}

  - id: report-publishes-and-counts-sources
    description: "/report runs the same checks as /validate but also publishes the result to report_endpoint"
    input: {type: command, name: /report, payload: {sources: [{name: orders}]}}
    expect: {mode: exact_match, value: {status: success, sources_reported: 1}}

  - id: source-updated-event-revalidates-the-one-source
    description: "data.source.updated re-runs quality checks for just the source that changed"
    input: {type: event, name: data.source.updated, payload: {source: {name: orders}}}
    expect: {mode: exact_match, value: {status: success, source: orders}}

  - id: unknown-command-is-an-error
    description: "An unrecognized command surfaces status=error rather than crashing"
    input: {type: command, name: /nope, args: []}
    expect: {mode: exact_match, value: {status: error}}

  - id: quality-daily-schedule-event-reports-passing-count
    description: "schedule.quality.daily runs checks across all sources and reports how many are passing"
    input: {type: event, name: schedule.quality.daily, payload: {sources: [{name: orders}]}}
    expect: {mode: exact_match, value: {status: success, sources_checked: 1}}

  - id: validate-output-helps-triage-a-failing-source
    description: "When a source's quality checks fail, the result should make it obvious which dimension is the problem"
    input:
      type: command
      name: /validate
      payload: {sources: [{name: orders}]}
    expect:
      mode: llm_judged
      rubric: >
        Score 100 if the per-source result breaks scores down by quality
        dimension (completeness, consistency, etc.) so a data engineer could
        tell which dimension is failing. Score lower if only a single
        aggregate score is returned with no per-dimension detail.
